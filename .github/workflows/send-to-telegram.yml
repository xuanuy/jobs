name: Send AEM Jobs to Telegram
on:
  push:
    paths:
      - 'aem_jobs_*.md'
    branches:
      - main

jobs:
  send-telegram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Send changed file to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^aem_jobs_[0-9]+\.md$' | head -1)
          echo "Changed file: $CHANGED"
          if [ -n "$CHANGED" ]; then
            python3 send_telegram.py "$CHANGED"
          else
            echo "No matching file found in diff"
          fi
