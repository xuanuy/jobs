name: Send AEM Jobs to Telegram

on:
  workflow_run:
    workflows: ["Daily AEM Job Scan - Singapore"]
    types: [completed]

jobs:
  send-telegram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find latest AEM jobs file
        id: find_file
        run: |
          LATEST=$(ls -t aem_jobs_*.md 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            echo "file=$LATEST" >> $GITHUB_OUTPUT
            echo "Found: $LATEST"
          else
            echo "No aem_jobs file found"
            exit 0
          fi

      - name: Send to Telegram
        if: steps.find_file.outputs.file != ''
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 send_telegram.py "${{ steps.find_file.outputs.file }}"
